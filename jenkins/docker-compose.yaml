services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    environment:
      # Cap JVM heap explicitly; without this the JVM sizes itself off
      # total host RAM, not the container's cgroup limit, and can overshoot.
      JAVA_OPTS: "-Xmx384m -Xms256m -XX:MaxMetaspaceSize=128m"
    deploy:
      resources:
        limits:
          memory: 480M
        reservations:
          memory: 300M
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

  agent1:
    image: jenkins-agent:docker
    environment:
      JENKINS_URL: "http://jenkins:8080"
      JENKINS_AGENT_NAME: "agent1"
      JENKINS_AGENT_WORKDIR: "/home/jenkins/agent"
      JAVA_OPTS: "-Xmx128m -Xms64m"
    entrypoint:
      - /bin/sh
      - -c
      - 'export JENKINS_SECRET="$$(cat /run/secrets/agent1_secret)"; exec jenkins-agent'
    secrets:
      - agent1_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 180M
        reservations:
          memory: 100M
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  agent2:
    image: jenkins-agent:docker
    build:
      context: .
      dockerfile: agent.Dockerfile
    entrypoint:
      - /bin/sh
      - -c
      - 'export JENKINS_SECRET="$$(cat /run/secrets/agent2_secret)"; exec jenkins-agent'
    environment:
      JENKINS_URL: "http://jenkins:8080"
      JENKINS_AGENT_NAME: "agent2"
      JENKINS_AGENT_WORKDIR: "/home/jenkins/agent"
      JAVA_OPTS: "-Xmx128m -Xms64m"
    secrets:
      - agent2_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 180M
        reservations:
          memory: 100M
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

secrets:
  agent1_secret:
    external: true
  agent2_secret:
    external: true

volumes:
  jenkins_home:
