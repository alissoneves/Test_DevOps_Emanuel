services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    environment:
      # Heap capped conservatively given the 909MB host; SerialGC has less
      # overhead than default G1GC for small heaps. Total JVM process memory
      # (heap + metaspace + thread stacks + native buffers) runs well above
      # -Xmx, so the cgroup limit below leaves headroom above the heap cap.
      JAVA_OPTS: "-Xmx192m -Xms128m -XX:MaxMetaspaceSize=256m -XX:+UseSerialGC -Duser.timezone=America/Sao_Paulo"
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 350M
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

  agent1:
    image: jenkins-agent:docker
    build:
      context: .
      dockerfile: agent.Dockerfile
    entrypoint:
      - /bin/sh
      - -c
      - 'export JENKINS_SECRET="$$(cat /run/secrets/agent1_secret)"; exec jenkins-agent'
    environment:
      JENKINS_URL: "http://jenkins:8080"
      JENKINS_AGENT_NAME: "agent1"
      JENKINS_AGENT_WORKDIR: "/home/jenkins/agent"
      JAVA_OPTS: "-Xmx128m -Xms64m -Duser.timezone=America/Sao_Paulo"
    secrets:
      - agent1_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 180M
        reservations:
          memory: 100M
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  agent2:
    image: jenkins-agent:docker
    build:
      context: .
      dockerfile: agent.Dockerfile
    entrypoint:
      - /bin/sh
      - -c
      - 'export JENKINS_SECRET="$$(cat /run/secrets/agent2_secret)"; exec jenkins-agent'
    environment:
      JENKINS_URL: "http://jenkins:8080"
      JENKINS_AGENT_NAME: "agent2"
      JENKINS_AGENT_WORKDIR: "/home/jenkins/agent"
      JAVA_OPTS: "-Xmx128m -Xms64m -Duser.timezone=America/Sao_Paulo"
    secrets:
      - agent2_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 180M
        reservations:
          memory: 100M
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

secrets:
  agent1_secret:
    external: true
  agent2_secret:
    external: true

volumes:
  jenkins_home:
